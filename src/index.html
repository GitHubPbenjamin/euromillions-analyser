<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuroMillions Analyser</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f8f9fa;color:#1a1a1a;font-size:15px}
    .app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
    h1{font-size:22px;font-weight:600;margin-bottom:1.5rem}
    .nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0;padding-bottom:1rem}
    .nav-btn{padding:6px 14px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;cursor:pointer}
    .nav-btn:hover{background:#f0f0f0}
    .nav-btn.active{background:#1a6fd4;color:#fff;border-color:#1a6fd4}
    .nav-btn.special{border-color:#1a6fd4;color:#1a6fd4}
    .nav-btn.special.active{background:#1a6fd4;color:#fff}
    .section{display:none}.section.active{display:block}
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
    .metric{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e8e8e8}
    .metric-label{font-size:12px;color:#888;margin-bottom:4px}
    .metric-val{font-size:22px;font-weight:600}
    .card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
    .card-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem}
    .heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:.5rem}
    .ball{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .bar-label{font-size:12px;color:#666;width:28px;text-align:right}
    .bar-track{flex:1;height:14px;background:#f0f0f0;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px}
    .bar-val{font-size:12px;color:#888;width:40px;text-align:right}
    .pair-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
    .pball{width:26px;height:26px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
    .overdue-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0}
    .badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
    .badge-hot{background:#fee2e2;color:#991b1b}
    .badge-cold{background:#dbeafe;color:#1e40af}
    .gen-ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
    .gen-num{background:#dbeafe;color:#1e40af}
    .gen-star{background:#fef3c7;color:#92400e}
    .btn{padding:8px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#333;cursor:pointer;font-size:13px;margin-right:6px;margin-bottom:6px}
    .btn:hover{background:#f5f5f5}
    .btn-primary{border-color:#1a6fd4;color:#1a6fd4}
    .legend{display:flex;gap:12px;font-size:11px;color:#888;margin-bottom:8px;flex-wrap:wrap}
    .leg-item{display:flex;align-items:center;gap:4px}
    .leg-sq{width:12px;height:12px;border-radius:2px}
    .num-picker{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:1rem}
    .pick-ball{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#f8f9fa;color:#555}
    .pick-ball.selected{background:#1a6fd4;color:#fff;border-color:#1a6fd4}
    .pick-ball.disabled{opacity:.3;cursor:default}
    .pick-star{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#f8f9fa;color:#555}
    .pick-star.selected{background:#f59e0b;color:#fff;border-color:#f59e0b}
    .star-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
    .sel-ball{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
    .sel-num{background:#dbeafe;color:#1e40af}
    .sel-star{background:#fef3c7;color:#92400e}
    .sel-empty{width:40px;height:40px;border-radius:50%;border:2px dashed #ddd}
    .crit-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
    .crit-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:600}
    .crit-good{background:#dcfce7;color:#166534}
    .crit-warn{background:#fef3c7;color:#92400e}
    .crit-bad{background:#fee2e2;color:#991b1b}
    .loading{text-align:center;padding:3rem;color:#888}
    select
